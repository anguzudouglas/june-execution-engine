<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>June Python Sandbox</title>

<link rel="stylesheet" href="/static/css/styles.css">

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>
            June Python Sandbox
        </h1>

        <p>
            AI-focused Python execution platform
            for data science, visualization,
            and computation.
        </p>

    </div>

    <div class="playground">

        <div class="editor-panel">

            <h2>Python Playground</h2>

            <textarea id="code-editor">
print("hello world")
            </textarea>

            <button id="run-btn">
                Execute Code
            </button>

        </div>

        <div class="output-panel">

            <h2>Output</h2>

            <pre id="output"></pre>

        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>

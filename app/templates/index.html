<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>June Python Sandbox</title>

<link rel="stylesheet" href="/static/css/styles.css">

<link
    rel="stylesheet"
    data-name="vs/editor/editor.main"
    href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/editor/editor.main.min.css"
/>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h1>June Sandbox</h1>

        <p class="subtitle">
            AI Python Runtime
        </p>

        <div class="examples">

            <h3>Payload Examples</h3>

            <button class="example-btn"
                onclick="loadExample('raw')">
                Raw Execution
            </button>

            <button class="example-btn"
                onclick="loadExample('filegen')">
                File Generation
            </button>

            <button class="example-btn"
                onclick="loadExample('analysis')">
                CSV Analysis
            </button>

            <button class="example-btn"
                onclick="loadExample('chart')">
                Visualization
            </button>

        </div>

        <div class="upload-section">

            <h3>Upload Files</h3>

            <input
                type="file"
                id="file-input"
                multiple
            />

            <button id="upload-btn">
                Upload
            </button>

            <div id="uploaded-files"></div>

        </div>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <button id="run-btn">
                Execute
            </button>

        </div>

        <div id="editor"></div>

        <div class="output-wrapper">

            <div class="output-card">

                <h3>Response</h3>

                <pre id="output"></pre>

            </div>

        </div>

    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

<script src="/static/js/app.js"></script>

</body>

</html>
